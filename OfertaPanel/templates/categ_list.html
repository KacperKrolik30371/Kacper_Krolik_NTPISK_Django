<!DOCTYPE html>
<html>
<head>
    <title>Dodaj szkolenie</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef1f5;
        }

        .container {
            width: 700px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            font-size: 20px;
        }

        .form-body {
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            font-size: 13px;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: 0.2s;
        }

        input:focus, select:focus {
            border-color: #007bff;
            outline: none;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .submit-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">
        Dodaj szkolenie
    </div>

    <div class="form-body">
        <form method="post">
            {% csrf_token %}

            <div class="section">
                <div class="section-title">Podstawowe dane</div>
                <div class="grid">
                    <div>
                        <label>Numer</label>
                        {{ form.numer }}
                    </div>

                    <div>
                        <label>Tytuł</label>
                        {{ form.tytul }}
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Parametry</div>
                <div class="grid">
                    <div>
                        <label>Kategoria</label>
                        {{ form.kategoria }}
                    </div>

                    <div>
                        <label>Liczba godzin</label>
                        {{ form.liczba_godzin }}
                    </div>

                    <div>
                        <label>Cena</label>
                        {{ form.cena }}
                    </div>

                    <div>
                        <label>Kolejność</label>
                        {{ form.kolejnosc }}
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Ustawienia</div>
                <div class="checkbox">
                    {{ form.publikuj }}
                    <label>Publikuj szkolenie</label>
                </div>
            </div>

            <button class="submit-btn" type="submit">
                Zapisz szkolenie
            </button>
        </form>
    </div>
</div>

</body>
</html>
